name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # for the Codecov OIDC upload
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # bash everywhere: powershell splits -coverprofile=coverage.out at the dot
        shell: bash
        run: go test -count=1 -coverprofile=coverage.out ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          use_oidc: true
          fail_ci_if_error: false

  # wire compatibility with the C reference implementation, enforced two ways:
  #
  # 1. the golden wire vectors in testdata/ are regenerated from the C
  #    implementation's main branch and must match the committed ones byte for
  #    byte (this catches drift on either side), and
  #
  # 2. live interop: real handshakes and payload exchange over UDP loopback
  #    between this implementation and the C client and server binaries, in
  #    both directions.
  wire-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Checkout the C reference implementation
        uses: actions/checkout@v7
        with:
          repository: mas-bandwidth/netcode
          path: netcode-c

      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Build the C reference implementation
        run: |
          cmake -S netcode-c -B netcode-c/build -DCMAKE_BUILD_TYPE=Release
          cmake --build netcode-c/build --parallel

      - name: Regenerate golden wire vectors from the C implementation and compare
        run: |
          cc -O2 -I netcode-c -I netcode-c/sodium -o /tmp/generate_vectors testdata/generate_vectors.c netcode-c/sodium/sodium.c
          mkdir -p /tmp/vectors
          /tmp/generate_vectors /tmp/vectors
          for vector in testdata/*.bin; do
            cmp "$vector" "/tmp/vectors/$(basename "$vector")"
          done

      - name: Golden wire vector tests
        run: go test -run TestWireCompat -v -count=1 .

      - name: Live interop with the C client and server
        run: NETCODE_C_BIN_DIR=$PWD/netcode-c/build/bin go test -run TestCInterop -v -count=1 .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Fuzz (10s per target)
        run: |
          for target in FuzzReadPacket FuzzWriteReadPacketRoundTrip FuzzParseAddress FuzzReadConnectToken FuzzReadConnectTokenPrivate FuzzConnectTokenPrivateRoundTrip; do
            go test -run='^$' -fuzz="^${target}$" -fuzztime=10s .
          done

      - name: Benchmarks (smoke)
        run: go test -run='^$' -bench=. -benchtime=1x .

      - name: Soak
        run: go run ./cmd/soak 500

  spec-sync:
    name: STANDARD.md matches upstream
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # STANDARD.md here is a VERBATIM VENDORED COPY of the wire-format
      # specification that lives in mas-bandwidth/netcode. This job fails if the
      # two have diverged.
      #
      # Why vendor rather than link: an implementer wants the normative text
      # beside the implementation, at the revision they are reading. Why check:
      # a duplicated normative document is the same failure as a duplicated
      # constant, except it drifts silently and the ports are what break.
      #
      # If this fails, the upstream spec changed. Read the diff, port whatever
      # it implies, then copy the new file across in the same commit.
      - name: Compare against mas-bandwidth/netcode
        run: |
          curl -fsSL -o /tmp/upstream-STANDARD.md \
            https://raw.githubusercontent.com/mas-bandwidth/netcode/main/STANDARD.md
          if ! diff -u /tmp/upstream-STANDARD.md STANDARD.md; then
            echo "::error::STANDARD.md has diverged from mas-bandwidth/netcode"
            exit 1
          fi
          echo "STANDARD.md matches upstream"
